<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS SAA-C03 模擬試験</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; }
  [hidden] { display: none !important; }
  .opt { transition: all 0.12s; cursor: pointer; }
  .opt:hover:not(.opt-disabled) { border-color: #FF9900; background: #FFF8F0; }
  .opt-selected { border-color: #FF9900 !important; background: #FFF3E0 !important; }
  .opt-correct  { border-color: #16A34A !important; background: #F0FDF4 !important; }
  .opt-wrong    { border-color: #DC2626 !important; background: #FEF2F2 !important; }
  .opt-missed   { border-color: #16A34A !important; background: #F0FDF4 !important; border-style: dashed !important; }
  .opt-disabled { cursor: default; }
  .qn { width:2rem; height:2rem; font-size:0.7rem; border-radius:4px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-weight:600; transition:all 0.1s; }
  .qn:hover { opacity: 0.8; }
  .qn-unanswered { background:#E2E8F0; color:#64748B; }
  .qn-answered   { background:#FF9900; color:#fff; }
  .qn-flagged    { background:#EAB308; color:#fff; }
  .qn-current    { outline: 2px solid #1D4ED8; outline-offset: 1px; }
  .qn-correct    { background:#16A34A; color:#fff; }
  .qn-wrong      { background:#DC2626; color:#fff; }
  .timer-warn    { color: #DC2626; animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity:0.4 } }
  .fade { animation: fadeIn 0.15s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px) } to { opacity:1; transform:translateY(0) } }
  ::-webkit-scrollbar { width:5px }
  ::-webkit-scrollbar-thumb { background:#CBD5E0; border-radius:9px }
  .domain-badge { font-size:0.65rem; padding:2px 8px; border-radius:99px; font-weight:600; letter-spacing:0.03em; }
</style>
</head>
<body class="bg-slate-100 min-h-screen">

<!-- ===== START SCREEN ===== -->
<div id="screen-start" class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-lg max-w-lg w-full p-8">
    <div class="flex items-center gap-3 mb-6">
      <div class="bg-orange-500 rounded-xl p-2"><svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
      <div>
        <div class="text-xs font-bold text-orange-500 tracking-widest">AWS CERTIFICATION</div>
        <div class="text-xl font-bold text-slate-800">SAA-C03 模擬試験</div>
      </div>
    </div>
    <!-- 問題数スライダー -->
    <div class="bg-slate-50 rounded-xl p-5 mb-4">
      <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-bold text-slate-700">問題数</span>
        <div class="flex items-baseline gap-1">
          <span id="q-count-display" class="text-3xl font-bold text-orange-500">65</span>
          <span class="text-sm text-slate-500">問</span>
        </div>
      </div>
      <input id="q-count-slider" type="range" min="5" max="65" step="5" value="65"
        oninput="updateStartInfo()"
        class="w-full h-2 bg-slate-200 rounded-full appearance-none cursor-pointer accent-orange-500">
      <div class="flex justify-between text-xs text-slate-400 mt-1">
        <span>5問</span><span>65問</span>
      </div>
    </div>
    <div class="grid grid-cols-3 gap-3 mb-4">
      <div class="bg-slate-50 rounded-xl p-4 text-center">
        <div id="time-display" class="text-2xl font-bold text-slate-800">130</div>
        <div class="text-xs text-slate-500 mt-1">分</div>
      </div>
      <div class="bg-slate-50 rounded-xl p-4 text-center">
        <div class="text-2xl font-bold text-orange-500">720</div>
        <div class="text-xs text-slate-500 mt-1">合格スコア</div>
      </div>
      <div class="bg-slate-50 rounded-xl p-4 text-center">
        <div class="text-2xl font-bold text-slate-800">4</div>
        <div class="text-xs text-slate-500 mt-1">ドメイン</div>
      </div>
    </div>
    <div class="text-sm text-slate-600 mb-6 space-y-1">
      <div class="flex items-center gap-2"><span class="w-2 h-2 bg-orange-400 rounded-full"></span>単一選択・複数選択の混在</div>
      <div class="flex items-center gap-2"><span class="w-2 h-2 bg-orange-400 rounded-full"></span>問題をフラグで保留可能</div>
      <div class="flex items-center gap-2"><span class="w-2 h-2 bg-orange-400 rounded-full"></span>提出前に全問見直し可能</div>
      <div class="flex items-center gap-2"><span class="w-2 h-2 bg-orange-400 rounded-full"></span>結果はドメイン別に表示</div>
    </div>
    <button onclick="startExam()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition text-base">試験を開始する</button>
  </div>
</div>

<!-- ===== EXAM SCREEN ===== -->
<div id="screen-exam" hidden class="min-h-screen flex flex-col">
  <!-- Header -->
  <header class="bg-slate-800 text-white px-4 py-2 flex items-center gap-4 sticky top-0 z-20 shadow">
    <div class="text-sm font-bold text-orange-400 hidden sm:block">AWS SAA-C03</div>
    <div class="flex-1">
      <div class="flex items-center justify-between mb-1">
        <span class="text-xs text-slate-300">問 <span id="hdr-cur">1</span> / <span id="hdr-tot">65</span></span>
        <span class="text-xs text-slate-300"><span id="hdr-ans">0</span> 回答済み</span>
      </div>
      <div class="w-full bg-slate-600 rounded-full h-1.5">
        <div id="progress-bar" class="bg-orange-400 h-1.5 rounded-full transition-all" style="width:0%"></div>
      </div>
    </div>
    <div id="timer-display" class="font-mono text-lg font-bold text-white min-w-[72px] text-right">2:10:00</div>
    <button onclick="showReview()" class="bg-orange-500 hover:bg-orange-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg transition">見直し</button>
  </header>

  <!-- Body -->
  <div class="flex flex-1 overflow-hidden">
    <!-- Question Panel -->
    <main id="question-panel" class="flex-1 overflow-y-auto p-4 sm:p-6">
      <div class="max-w-2xl mx-auto fade" id="question-container">
        <div class="flex items-center gap-2 mb-3">
          <span id="q-domain-badge" class="domain-badge bg-blue-100 text-blue-700"></span>
          <span id="q-type-badge" class="domain-badge bg-slate-100 text-slate-600"></span>
        </div>
        <h2 id="q-text" class="text-slate-800 text-base leading-relaxed mb-5 font-medium"></h2>
        <div id="q-options" class="space-y-3"></div>
      </div>
    </main>

    <!-- Navigator Panel (desktop) -->
    <aside class="hidden lg:block w-52 bg-white border-l border-slate-200 overflow-y-auto p-3">
      <div class="text-xs font-bold text-slate-500 mb-2 tracking-wider">問題ナビゲーター</div>
      <div id="nav-grid" class="grid grid-cols-5 gap-1"></div>
      <div class="mt-4 space-y-1.5 text-xs text-slate-500">
        <div class="flex items-center gap-2"><span class="w-4 h-4 qn qn-answered"></span>回答済み</div>
        <div class="flex items-center gap-2"><span class="w-4 h-4 qn qn-flagged"></span>フラグ</div>
        <div class="flex items-center gap-2"><span class="w-4 h-4 qn qn-unanswered"></span>未回答</div>
      </div>
    </aside>
  </div>

  <!-- Footer -->
  <footer class="bg-white border-t border-slate-200 px-4 py-3 flex items-center gap-2 sticky bottom-0 z-10">
    <button onclick="prevQuestion()" class="flex items-center gap-1 text-slate-600 hover:text-slate-800 border border-slate-300 hover:border-slate-400 px-3 py-2 rounded-lg text-sm transition">
      ← 前へ
    </button>
    <button id="flag-btn" onclick="toggleFlag()" class="flex items-center gap-1 text-slate-600 hover:text-yellow-600 border border-slate-300 hover:border-yellow-400 px-3 py-2 rounded-lg text-sm transition">
      🚩 フラグ
    </button>
    <div class="flex-1"></div>
    <button onclick="nextQuestion()" class="flex items-center gap-1 bg-slate-700 hover:bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
      次へ →
    </button>
  </footer>
</div>

<!-- ===== REVIEW SCREEN ===== -->
<div id="screen-review" hidden class="min-h-screen bg-slate-100 p-4">
  <div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl shadow p-6 mb-4">
      <h1 class="text-xl font-bold text-slate-800 mb-1">試験の見直し</h1>
      <p class="text-sm text-slate-500">提出前に回答を確認してください</p>
      <div class="grid grid-cols-3 gap-3 mt-4">
        <div class="bg-orange-50 rounded-xl p-3 text-center">
          <div id="rv-answered" class="text-2xl font-bold text-orange-600">0</div>
          <div class="text-xs text-slate-500">回答済み</div>
        </div>
        <div class="bg-yellow-50 rounded-xl p-3 text-center">
          <div id="rv-flagged" class="text-2xl font-bold text-yellow-600">0</div>
          <div class="text-xs text-slate-500">フラグあり</div>
        </div>
        <div class="bg-red-50 rounded-xl p-3 text-center">
          <div id="rv-unanswered" class="text-2xl font-bold text-red-500">0</div>
          <div class="text-xs text-slate-500">未回答</div>
        </div>
      </div>
    </div>
    <div id="review-list" class="space-y-2 mb-4"></div>
    <div class="flex gap-3">
      <button onclick="goBackToExam()" class="flex-1 border border-slate-300 hover:border-slate-400 text-slate-700 font-medium py-3 rounded-xl transition text-sm">試験に戻る</button>
      <button onclick="submitExam()" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition">提出する</button>
    </div>
  </div>
</div>

<!-- ===== RESULTS SCREEN ===== -->
<div id="screen-results" hidden class="min-h-screen bg-slate-100 p-4">
  <div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl shadow-lg p-6 mb-4 text-center">
      <div id="result-icon" class="text-6xl mb-3"></div>
      <div id="result-title" class="text-2xl font-bold mb-1"></div>
      <div id="result-score" class="text-6xl font-bold text-orange-500 my-3"></div>
      <div class="text-sm text-slate-500 mb-4">合格ライン: 720 / 1000</div>
      <div class="grid grid-cols-3 gap-3 text-sm">
        <div class="bg-slate-50 rounded-xl p-3">
          <div id="res-correct" class="text-xl font-bold text-slate-800"></div>
          <div class="text-xs text-slate-500">正解</div>
        </div>
        <div class="bg-slate-50 rounded-xl p-3">
          <div id="res-wrong" class="text-xl font-bold text-slate-800"></div>
          <div class="text-xs text-slate-500">不正解</div>
        </div>
        <div class="bg-slate-50 rounded-xl p-3">
          <div id="res-time" class="text-xl font-bold text-slate-800"></div>
          <div class="text-xs text-slate-500">所要時間</div>
        </div>
      </div>
    </div>

    <!-- Domain Breakdown -->
    <div class="bg-white rounded-2xl shadow p-6 mb-4">
      <h2 class="text-base font-bold text-slate-700 mb-4">ドメイン別スコア</h2>
      <div id="domain-breakdown" class="space-y-3"></div>
    </div>

    <div class="flex gap-3">
      <button onclick="reviewAnswers()" class="flex-1 border border-slate-300 hover:border-orange-400 text-slate-700 font-medium py-3 rounded-xl transition text-sm">解答を確認する</button>
      <button onclick="location.reload()" class="flex-1 bg-slate-700 hover:bg-slate-800 text-white font-bold py-3 rounded-xl transition text-sm">もう一度挑戦</button>
    </div>
  </div>
</div>

<!-- ===== ANSWER REVIEW SCREEN ===== -->
<div id="screen-answers" hidden class="min-h-screen bg-slate-100">
  <header class="bg-slate-800 text-white px-4 py-3 flex items-center gap-3 sticky top-0 z-20">
    <button onclick="backToResults()" class="text-slate-300 hover:text-white text-sm">← 結果へ</button>
    <span class="text-sm font-bold flex-1 text-center">解答レビュー</span>
    <div class="text-xs text-slate-300"><span id="ar-cur">1</span> / <span id="ar-tot">65</span></div>
  </header>
  <div class="max-w-2xl mx-auto p-4">
    <div id="ar-container" class="fade"></div>
    <div class="flex gap-3 mt-4">
      <button onclick="arPrev()" class="flex-1 border border-slate-300 bg-white hover:border-slate-400 text-slate-700 py-3 rounded-xl text-sm transition">← 前の問題</button>
      <button onclick="arNext()" class="flex-1 bg-slate-700 hover:bg-slate-800 text-white py-3 rounded-xl text-sm font-medium transition">次の問題 →</button>
    </div>
  </div>
</div>

<script>
// ===================== QUESTION BANK =====================
const BANK = [
// ---- Domain 1: セキュアなアーキテクチャの設計 ----
{d:1,dn:'セキュアなアーキテクチャ',
t:'EC2上のWebアプリケーションがAmazon RDS MySQLに接続しています。データベースの認証情報を安全に保存し、30日ごとに自動ローテーションさせる最適なサービスはどれですか？',
type:'single',
opts:[
  {id:'A',txt:'AWS Systems Manager Parameter Store（SecureString）'},
  {id:'B',txt:'AWS Secrets Manager'},
  {id:'C',txt:'AWS Key Management Service（KMS）'},
  {id:'D',txt:'Amazon S3（サーバーサイド暗号化）'},
],correct:['B'],
exp:'AWS Secrets ManagerはRDS・Aurora・Redshift等とネイティブ統合しており、認証情報の自動ローテーションが可能です。Parameter StoreはSecureStringで暗号化保存できますが自動ローテーション機能はありません。KMSは暗号化キー管理専用です。'},

{d:1,dn:'セキュアなアーキテクチャ',
t:'あるサブネット間のトラフィックをステートレスに制御し、特定のIPからのアクセスをDENYルールで明示的に拒否したい。どのAWSの機能を使うべきですか？',
type:'single',
opts:[
  {id:'A',txt:'セキュリティグループ'},
  {id:'B',txt:'ネットワークACL（NACL）'},
  {id:'C',txt:'AWS WAF'},
  {id:'D',txt:'VPCピアリング'},
],correct:['B'],
exp:'NACLはステートレス（インバウンド・アウトバウンド両方を定義）でDENYルールをサポートします。セキュリティグループはステートフル（戻りトラフィック自動許可）で明示的DENYルールはありません。'},

{d:1,dn:'セキュアなアーキテクチャ',
t:'EC2インスタンスがS3バケットにアクセスする必要があります。アクセスキーをアプリケーションにハードコードせずに安全に実現する最良の方法はどれですか？',
type:'single',
opts:[
  {id:'A',txt:'IAMユーザーを作成しアクセスキーを環境変数に設定する'},
  {id:'B',txt:'IAMロールを作成しEC2インスタンスにアタッチする'},
  {id:'C',txt:'Secrets Managerにアクセスキーを保存してアプリが起動時に取得する'},
  {id:'D',txt:'S3バケットをパブリックにしてIPアドレスで制限する'},
],correct:['B'],
exp:'IAMロールをEC2インスタンスにアタッチすることで、インスタンスメタデータサービス（IMDS）経由で一時的な認証情報が自動提供されます。アクセスキーを管理・ローテーションする必要がなく、最もセキュアな方法です。'},

{d:1,dn:'セキュアなアーキテクチャ',
t:'S3バケットへの意図しないパブリックアクセスを防ぐためのベストプラクティスはどれですか？',
type:'single',
opts:[
  {id:'A',txt:'バケットポリシーでprincipal: "*"を使用するが、条件でIPを制限する'},
  {id:'B',txt:'S3パブリックアクセスブロック設定をアカウントレベルで有効にする'},
  {id:'C',txt:'CloudFrontをすべてのS3の前段に配置する'},
  {id:'D',txt:'S3バケットをプライベートサブネットに配置する'},
],correct:['B'],
exp:'S3パブリックアクセスブロックをアカウントレベルで有効にすると、バケットポリシーやACLによる意図しないパブリックアクセスをまとめて防止できます。S3はVPCサブネットの概念がありません。'},

{d:1,dn:'セキュアなアーキテクチャ',
t:'VPC内のEC2インスタンスがインターネットを経由せずにS3にアクセスする必要があります。最もコスト効率の高い方法はどれですか？',
type:'single',
opts:[
  {id:'A',txt:'NATゲートウェイ経由でS3にアクセスする'},
  {id:'B',txt:'S3のVPCゲートウェイエンドポイントを使用する'},
  {id:'C',txt:'VPCインターフェースエンドポイント（PrivateLink）を使用する'},
  {id:'D',txt:'Direct Connectを使用する'},
],correct:['B'],
exp:'S3とDynamoDBはゲートウェイエンドポイントをサポートしており、追加料金なしでVPCからインターネットを経由せずにアクセスできます。インターフェースエンドポイント（PrivateLink）は時間課金とデータ処理料金が発生します。NATゲートウェイはデータ転送料金が高額です。'},

{d:1,dn:'セキュアなアーキテクチャ',
t:'AWS上のAPIコールの監査ログを取得し、S3に保存してコンプライアンス要件を満たしたい。どのサービスを使いますか？',
type:'single',
opts:[
  {id:'A',txt:'Amazon CloudWatch Logs'},
  {id:'B',txt:'AWS CloudTrail'},
  {id:'C',txt:'Amazon GuardDuty'},
  {id:'D',txt:'AWS Config'},
],correct:['B'],
exp:'CloudTrailはAWSアカウント内のAPIコールをすべて記録し、S3に保存できます。誰が・いつ・何のAPIを呼んだかを追跡できます。CloudWatch Logsはアプリケーションログ向け。GuardDutyは脅威検出、Configはリソースのコンプライアンスチェックのサービスです。'},

{d:1,dn:'セキュアなアーキテクチャ',
t:'Webアプリケーションに対するSQLインジェクションやクロスサイトスクリプティング（XSS）攻撃を防ぐ最適なAWSサービスはどれですか？',
type:'single',
opts:[
  {id:'A',txt:'AWS Shield'},
  {id:'B',txt:'Amazon GuardDuty'},
  {id:'C',txt:'AWS WAF'},
  {id:'D',txt:'AWS Security Hub'},
],correct:['C'],
exp:'AWS WAFはWebアプリケーションファイアウォールで、SQLインジェクション・XSS・悪意のあるボットなどのWebアプリケーション攻撃をL7レベルでフィルタリングします。ShieldはDDoS対策、GuardDutyは脅威検出、Security Hubはセキュリティ状態の統合管理です。'},

{d:1,dn:'セキュアなアーキテクチャ',
t:'AWSアカウントで異常なAPIコールや不審なIPからのアクセスなどの脅威を継続的に検出したい。どのサービスを使いますか？',
type:'single',
opts:[
  {id:'A',txt:'AWS CloudTrail'},
  {id:'B',txt:'Amazon GuardDuty'},
  {id:'C',txt:'AWS Config'},
  {id:'D',txt:'Amazon Macie'},
],correct:['B'],
exp:'Amazon GuardDutyはCloudTrail・VPCフローログ・DNSログを機械学習で継続的に分析し、不審なアクティビティや脅威をほぼリアルタイムに検出します。CloudTrailはログ記録のみ、Configはリソースコンプライアンスチェック、MacieはS3内の機密データ検出です。'},

{d:1,dn:'セキュアなアーキテクチャ',
t:'AWS OrganizationsのSCPs（サービスコントロールポリシー）について正しい説明を2つ選んでください。',
type:'multi',choose:2,
opts:[
  {id:'A',txt:'SCPsはメンバーアカウントのルートユーザーにも適用される'},
  {id:'B',txt:'SCPsはIAMポリシーより優先されるため、SCPで許可すれば必ずアクセスできる'},
  {id:'C',txt:'SCPsを有効化すると、明示的な許可がなくてもデフォルトですべての操作が許可される'},
  {id:'D',txt:'SCPsは管理アカウント（マスターアカウント）自身には適用されない'},
],correct:['A','D'],
exp:'SCPsはメンバーアカウントのルートユーザーを含む全IAMエンティティに適用されます（A）。また管理アカウント自身には適用されません（D）。SCPはガードレール（最大許可範囲）であり、SCPで許可されていても別途IAMポリシーでの許可が必要です。SCPのデフォルト動作はFullAWSAccessポリシーが付与されているため全許可ですが、明示的なDenyで制限します。'},

{d:1,dn:'セキュアなアーキテクチャ',
t:'EBSボリュームに保存されるデータを暗号化するために使用される、AWS管理のキーより高い制御性を持つ選択肢はどれですか？',
type:'single',
opts:[
  {id:'A',txt:'S3管理キー（SSE-S3）'},
  {id:'B',txt:'AWS管理のKMSキー（aws/ebs）'},
  {id:'C',txt:'カスタマー管理のKMSキー（CMK）'},
  {id:'D',txt:'クライアントサイド暗号化'},
],correct:['C'],
exp:'カスタマー管理のKMSキー（CMK）を使用すると、キーポリシーの管理、自動ローテーション設定、CloudTrailによるキー使用ログなど、高い制御性が得られます。AWS管理キーは自動でローテーションされますがポリシー変更はできません。'},

{d:1,dn:'セキュアなアーキテクチャ',
t:'S3バケット内の機密個人情報（PII）を自動的に検出・分類したい。最適なサービスはどれですか？',
type:'single',
opts:[
  {id:'A',txt:'Amazon GuardDuty'},

{d:1,dn:'セキュアなアーキテクチャ',

{d:1,dn:'セキュアなアーキテクチャ',

{d:2,dn:'弾力性の高いアーキテクチャ',
t:'Webアプリケーションがトラフィック増加時に自動でEC2インスタンスを追加し、減少時に削除したい。最小限の運用負荷で実現する方法はどれですか？',

{d:2,dn:'弾力性の高いアーキテクチャ',

{d:2,dn:'弾力性の高いアーキテクチャ',
t:'注文処理システムでWebサーバーとバックエンド処理を疎結合にし、バックエンドが一時的に停止してもメッセージを失わないようにしたい。最適なアーキテクチャはどれですか？',

{d:2,dn:'弾力性の高いアーキテクチャ',

{d:2,dn:'弾力性の高いアーキテクチャ',

{d:2,dn:'弾力性の高いアーキテクチャ',

  {id:'E',txt:'S3 Cross-Region Replicationを有効にする'},
],correct:['A','B'],
exp:'バージョニングを有効にすると削除・上書きされても以前のバージョンが保持されます（A）。S3 Object Lockは WORM（Write Once Read Many）モデルで、設定した保持期間中はオブジェクトの上書き・削除を禁止します（B）。なお MFA Delete はバージョン削除にMFA認証を必須にする別機能です。ライフサイクルポリシーはストレージクラス移行用であり保護機能ではありません。'},

{d:2,dn:'弾力性の高いアーキテクチャ',

{d:2,dn:'弾力性の高いアーキテクチャ',

{d:3,dn:'高パフォーマンスなアーキテクチャ',

{d:3,dn:'高パフォーマンスなアーキテクチャ',

{d:3,dn:'高パフォーマンスなアーキテクチャ',

{d:3,dn:'高パフォーマンスなアーキテクチャ',
t:'Windowsファイルサーバーをクラウドに移行し、SMBプロトコルでWindowsEC2インスタンスから共有ファイルシステムとして使用したい。最適なサービスはどれですか？',

{d:3,dn:'高パフォーマンスなアーキテクチャ',

  {id:'C',txt:'スナップショットでバックアップが可能'},
  {id:'D',txt:'EBSボリュームと同様にデタッチして別インスタンスにアタッチできる'},
],correct:['B'],
exp:'インスタンスストアはEC2ホストに物理的に接続されたストレージで、非常に高いI/OパフォーマンスをEBSより低いコストで提供します。ただしインスタンスを停止・終了するとデータは消えます（一時ストレージ）。バッファ・キャッシュ・一時ファイルに最適です。'},

{d:3,dn:'高パフォーマンスなアーキテクチャ',

],correct:['B'],

{d:3,dn:'高パフォーマンスなアーキテクチャ',
t:'複数のLambda関数を順番に実行し、各ステップの状態管理やエラーハンドリングを視覚的に設計・管理したい。最適なサービスはどれですか？',

  {id:'B',txt:'Amazon EventBridge'},
  {id:'C',txt:'AWS Step Functions'},
  {id:'D',txt:'Amazon SQS FIFO'},
],correct:['C'],
exp:'AWS Step Functionsはサーバーレスのオーケストレーションサービスで、複数のLambda関数や他のAWSサービスをワークフロー（ステートマシン）として視覚的に設計・実行できます。各ステップのエラーハンドリング・リトライ・並列実行を管理します。'},

{d:3,dn:'高パフォーマンスなアーキテクチャ',

  {id:'D',txt:'60分'},
],correct:['C'],

{d:4,dn:'コスト最適化されたアーキテクチャ',

exp:'常時稼働の定常ワークロードには予約インスタンス（RI）またはSavings Plansが最適で、オンデマンドと比較して最大72%の割引を受けられます。スポットは中断許容ワークロード向けで割引は大きいですが可用性保証がありません。'},

{d:4,dn:'コスト最適化されたアーキテクチャ',

  {id:'D',txt:'Savings Plans'},
],correct:['B'],
exp:'スポットインスタンスはAWSの余剰キャパシティを使用し、オンデマンドと比較して最大90%の割引を受けられます。ただしAWSの需要に応じていつでも中断される可能性があります。中断許容性があるバッチ処理・CI/CD・機械学習訓練などに最適です。'},

{d:4,dn:'コスト最適化されたアーキテクチャ',

  {id:'D',txt:'S3 One Zone-IA'},

exp:'S3 Intelligent-Tieringはアクセスパターンを監視し、頻繁にアクセスされるオブジェクトと頻度が低いオブジェクトを自動的に最適なストレージ層に移動します。アクセスパターンが予測できない場合に最もコスト効率が良いです（ただし小さなオブジェクトの多いケースでは監視料金に注意）。'},

{d:4,dn:'コスト最適化されたアーキテクチャ',

{d:4,dn:'コスト最適化されたアーキテクチャ',
t:'プライベートサブネットのEC2インスタンスにインターネットアクセスを提供する際、NATゲートウェイとNATインスタンスを比較したとき、NATゲートウェイを選ぶ理由はどれですか？',

  {id:'C',txt:'NATゲートウェイはセキュリティグループで制御できる'},
  {id:'D',txt:'NATゲートウェイはEC2インスタンスとして動作するためOSパッチが必要'},
],correct:['B'],
exp:'NATゲートウェイはAWSが管理するマネージドサービスで、高可用性・自動スケーリング・帯域幅の自動管理が提供されます。NATインスタンスはEC2を自分で管理（パッチ・フェイルオーバー）する必要があります。コストはトラフィック量によりNATインスタンスの方が安い場合があります。'},

{d:4,dn:'コスト最適化されたアーキテクチャ',

  {id:'C',txt:'Reserved Instancesの購入推奨を提供する'},
  {id:'D',txt:'S3のストレージクラスを自動的に最適化する'},
],correct:['B'],
exp:'AWS Compute Optimizerは過去のメトリクスをMLで分析し、EC2インスタンスタイプ・Auto Scalingグループ・EBSボリューム・Lambda関数のメモリサイズを適切なサイズに変更するための推奨事項を提供します。右サイジングによりコスト削減と過不足のリソース最適化を実現します。'},

{d:4,dn:'コスト最適化されたアーキテクチャ',
t:'月に数回しか実行しない軽量なAPIエンドポイントをホスティングするのに最もコスト効率の良い方法はどれですか？',

  {id:'B',txt:'EC2 Auto Scalingで最小0台に設定する'},

  {id:'D',txt:'コンテナをECSで実行する'},
],correct:['C'],
exp:'Lambdaは実際の実行時間とリクエスト数に対してのみ課金（月100万リクエストと400,000GB秒まで無料）されます。月数回の実行であればほぼ無料で運用できます。EC2は起動しているだけで課金が発生します。'},

{d:4,dn:'コスト最適化されたアーキテクチャ',
t:'AWSの複数アカウントを一元管理し、EC2・RDS・Redshiftの予約インスタンスを複数アカウント間で共有してコストを最適化する機能はどれですか？',

  {id:'C',txt:'AWS Budgets'},
  {id:'D',txt:'AWS Trusted Advisor'},
],correct:['B'],
exp:'AWS Organizationsの連結請求（Consolidated Billing）機能により、複数アカウントのコストを一括管理し、予約インスタンスやSavings Plansを組織内の任意のアカウントで共有できます。またボリューム割引も組織全体で適用されます。'},

{d:4,dn:'コスト最適化されたアーキテクチャ',
t:'S3ライフサイクルポリシーの主な用途はどれですか？',
type:'single',
opts:[

],correct:['B'],
exp:'S3ライフサイクルポリシーを使うと、作成後30日でStandard-IA、90日後にGlacierへ移行・一定期間後に削除などを自動化できます。ストレージコストを削減するためによく使われます。レプリケーションはCross-Region Replication（CRR）が担当します。'},

{d:4,dn:'コスト最適化されたアーキテクチャ',
t:'EC2 Auto Scalingで業務時間（平日9〜18時）のみリソースを増やし、夜間・週末にスケールダウンしたい。最適な方法はどれですか？',
type:'single',

  {id:'C',txt:'ステップスケーリングポリシー'},
  {id:'D',txt:'シンプルスケーリングポリシー'},
],correct:['B'],
exp:'スケジュールされたスケーリングを使うと、予測可能なトラフィックパターン（業務時間・曜日など）に合わせて特定の時刻にAuto Scalingグループのサイズを自動変更できます。ターゲット追跡はメトリクスに基づく動的スケーリングです。'},

{d:2,dn:'弾力性の高いアーキテクチャ',

{d:3,dn:'高パフォーマンスなアーキテクチャ',

{d:2,dn:'弾力性の高いアーキテクチャ',

{d:3,dn:'高パフォーマンスなアーキテクチャ',

{d:1,dn:'セキュアなアーキテクチャ',

{d:4,dn:'コスト最適化されたアーキテクチャ',

{d:2,dn:'弾力性の高いアーキテクチャ',

{d:3,dn:'高パフォーマンスなアーキテクチャ',

t:'KMSのキーポリシーとIAMポリシーの関係について正しいものはどれですか？',
type:'single',
opts:[

  {id:'B',txt:'KMSキーへのアクセスにはキーポリシーで許可されていることが前提で、さらにIAMポリシーでも許可が必要'},
  {id:'C',txt:'キーポリシーはAWSマネージドキーにのみ適用される'},
  {id:'D',txt:'キーポリシーで許可されていれば、IAMポリシーに関わらずアクセスできる'},
],correct:['B'],
exp:'KMSキーへのアクセスはキーポリシー（リソースベース）とIAMポリシー（アイデンティティベース）の両方で許可が必要です。キーポリシーは必須（デフォルトポリシーで同アカウントのIAM制御を許可）で、IAMポリシーでさらに絞り込みます。これにより最小権限の原則を実現します。'},

{d:1,dn:'セキュアなアーキテクチャ',
t:'S3バケットポリシーで特定のIAMロールからのみアクセスを許可するとき、Principalには何を指定しますか？',
type:'single',
opts:[
  {id:'A',txt:'ロール名のみ（例："my-role"）'},
  {id:'B',txt:'ロールのARN（例："arn:aws:iam::123456789012:role/my-role"）'},
  {id:'C',txt:'AWSアカウントIDのみ'},
  {id:'D',txt:'"*"を使いConditionで制限する'},
],correct:['B'],
exp:'S3バケットポリシーのPrincipalにはIAMリソースのARN（Amazon Resource Name）を指定します。ロールの場合は "arn:aws:iam::アカウントID:role/ロール名" の形式です。ロール名だけでは識別できません。"*"はすべてのプリンシパルを意味するため、セキュリティ上特定のARNを指定するのがベストプラクティスです。'},

{d:1,dn:'セキュアなアーキテクチャ',
t:'AWSのコンプライアンスレポート（SOC・PCI DSSなど）や規制文書をダウンロードして監査証跡に利用したい。どのサービスを使いますか？',

opts:[

  {id:'B',txt:'AWS Audit Manager'},
  {id:'C',txt:'AWS Artifact'},
  {id:'D',txt:'AWS Security Hub'},
],correct:['C'],
exp:'AWS ArtifactはAWSのコンプライアンスに関するドキュメント（SOC 1/2/3・PCI DSS・ISO 27001・FedRAMP等）をオンデマンドでダウンロードできるセルフサービスポータルです。Audit Managerはコンプライアンス評価の証拠収集を自動化するサービスです。'},

{d:1,dn:'セキュアなアーキテクチャ',
t:'EC2インスタンスのメタデータエンドポイント（IMDS）のセキュリティを強化する方法として推奨されるものはどれですか？',
type:'single',
opts:[
  {id:'A',txt:'IMDSを完全に無効化する'},
  {id:'B',txt:'IMDSv2（セッション指向）を強制し、IMDSv1を無効化する'},
  {id:'C',txt:'メタデータへのアクセスをセキュリティグループで制限する'},
  {id:'D',txt:'IAMロールをEC2インスタンスにアタッチしない'},
],correct:['B'],
exp:'IMDSv2はPUTリクエストでセッショントークンを取得してからGETリクエストを行うセッション指向の方式で、SSRF（サーバーサイドリクエストフォージェリ）攻撃による認証情報の窃取を防ぎます。IMDSv1は認証なしでアクセスできるためリスクがあります。aws:ec2MetadataHttpTokensをrequiredに設定してIMDSv2を強制します。'},

{d:1,dn:'セキュアなアーキテクチャ',
t:'あるサービスがSTS（Security Token Service）のAssumeRoleを使って別アカウントのリソースにアクセスするとき、受け入れ側アカウントのロールに設定すべきものはどれですか？',
type:'single',
opts:[
  {id:'A',txt:'権限ポリシーに発信元アカウントIDを追記する'},
  {id:'B',txt:'信頼ポリシー（Trust Policy）に発信元のプリンシパルを許可として記載する'},
  {id:'C',txt:'発信元アカウントにアクセスキーを発行して渡す'},
  {id:'D',txt:'両アカウントをVPCピアリングで接続する'},
],correct:['B'],
exp:'クロスアカウントのロール引き受けには、受け入れ側ロールの信頼ポリシー（Trust Policy）にAssumeRoleを許可する発信元プリンシパル（アカウントID・IAMロール・サービス等）を記載します。権限ポリシーはそのロールが何をできるかを定義し、信頼ポリシーは誰がそのロールを引き受けられるかを定義します。'},

{d:1,dn:'セキュアなアーキテクチャ',
t:'S3バケットへの大量のアクセスを管理しつつ、各アプリケーションやチームに異なるアクセス権限を付与したい。バケットポリシーを変更せずに実現する方法はどれですか？',

  {id:'B',txt:'S3 Access Pointsを使用する'},

  {id:'D',txt:'CloudFrontのオリジンアクセスコントロール（OAC）を使用する'},
],correct:['B'],
exp:'S3 Access PointsはS3バケットに対して複数の名前付きエンドポイントを作成し、それぞれ異なるアクセスポリシーを設定できます。例えば分析チーム用・アプリA用・アプリB用のAccess Pointを別々のポリシーで管理でき、バケットポリシーを複雑にせずに済みます。'},

{d:2,dn:'弾力性の高いアーキテクチャ',

],correct:['C'],

{d:2,dn:'弾力性の高いアーキテクチャ',

  {id:'D',txt:'RDS for MySQL マルチAZ'},
],correct:['B'],

{d:2,dn:'弾力性の高いアーキテクチャ',
t:'SQSキューで処理に失敗したメッセージを一定回数リトライ後に保存して、後で分析・再処理できるようにしたい。どの機能を使いますか？',

],correct:['B'],
exp:'デッドレターキュー（DLQ）は指定した最大受信回数（maxReceiveCount）を超えて処理できなかったメッセージを自動的に別のキュー（DLQ）に移動します。失敗したメッセージをCloudWatchアラームで監視したり、後でデバッグ・再処理するためのパターンです。SQS標準キュー・FIFOキュー・SNSサブスクリプションで使用できます。'},

{d:2,dn:'弾力性の高いアーキテクチャ',

  {id:'D',txt:'複数リージョンのDynamoDBテーブルを同期する'},
],correct:['B'],
exp:'DynamoDB Streamsはテーブルへのデータ変更（INSERT・MODIFY・REMOVE）を時系列の変更ログとして最大24時間保持します。Lambda関数のトリガーとして使い、変更通知の送信・検索インデックスの更新・監査ログ・クロスリージョンレプリケーション（グローバルテーブルの基盤）などに活用されます。'},

{d:2,dn:'弾力性の高いアーキテクチャ',

type:'single',

  {id:'A',txt:'Lambda 予約済み同時実行数（Reserved Concurrency）'},

],correct:['B'],

{d:2,dn:'弾力性の高いアーキテクチャ',
t:'Amazon EventBridgeの主なユースケースはどれですか？',
type:'single',
opts:[
  {id:'A',txt:'EC2インスタンスのメトリクスをリアルタイムに収集する'},

  {id:'C',txt:'複数のマイクロサービス間のAPIゲートウェイとして動作する'},
  {id:'D',txt:'CloudTrailのログをリアルタイムに分析する'},
],correct:['B'],
exp:'EventBridgeはイベント駆動アーキテクチャのバス（ハブ）として機能します。EC2の状態変化・S3のオブジェクト作成・CodePipelineの完了などのAWSイベント、定期スケジュール（cron）、SalesforceやZendeskなどのSaaSイベントを受け取り、ルールに基づいてLambda・SQS・SNS・ECSタスク等にルーティングします。'},

{d:2,dn:'弾力性の高いアーキテクチャ',
t:'CloudWatchアラームで「CPU使用率が5分間で80%超え」と「メモリ使用率が5分間で90%超え」の両条件が同時に成立した場合にのみアラートを発したい。どの機能を使いますか？',
type:'single',
opts:[
  {id:'A',txt:'CloudWatch メトリクス数式'},
  {id:'B',txt:'CloudWatch コンポジットアラーム（Composite Alarm）'},
  {id:'C',txt:'CloudWatch Logs Insights'},
  {id:'D',txt:'AWS Health Dashboard'},
],correct:['B'],
exp:'CloudWatch コンポジットアラームは複数のアラームをAND/OR/NOT論理演算で組み合わせた複合アラームです。複数条件の同時成立でのみ通知することでアラートの誤検知（ノイズ）を減らせます。例えばCPUとメモリ両方が高い場合のみページャーに通知するなどのユースケースに使います。'},

{d:2,dn:'弾力性の高いアーキテクチャ',

  {id:'B',txt:'レイテンシールーティングはAWSが測定するネットワーク遅延で判断し、地理的近接性はユーザーとリソースの物理的距離でバイアス調整可能'},
  {id:'C',txt:'地理的近接性ルーティングはRoute 53 Resolverのみで使用できる'},
  {id:'D',txt:'レイテンシールーティングはRoute 53 Traffic Policyでのみ使用できる'},
],correct:['B'],
exp:'レイテンシールーティングはAWSが継続的に測定するユーザー→リージョン間のネットワーク遅延（必ずしも物理距離に比例しない）でルーティングします。地理的近接性ルーティングは物理的な距離に基づき、バイアス値を使って特定リージョンのトラフィック範囲を広げたり狭めたりできます。Traffic Flowで使用します。'},

{d:2,dn:'弾力性の高いアーキテクチャ',

],correct:['B'],

{d:2,dn:'弾力性の高いアーキテクチャ',

  {id:'C',txt:'CloudWatchアラームによるEC2インスタンスの手動追加'},

{d:3,dn:'高パフォーマンスなアーキテクチャ',

// ===================== APP STATE =====================
const S = {
  phase: 'start',
  qs: [],        // selected 65 questions
  ans: {},       // { idx: ['A','B'] }
  flagged: new Set(),
  cur: 0,
  timeLeft: 130 * 60,
  timer: null,
  startTime: null,
  arIdx: 0,
};

let TOTAL = 65;
const PASS_SCORE = 720;
const DOMAIN_NAMES = {1:'セキュアなアーキテクチャ',2:'弾力性の高いアーキテクチャ',3:'高パフォーマンスなアーキテクチャ',4:'コスト最適化されたアーキテクチャ'};

function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function show(id) {
  ['screen-start','screen-exam','screen-review','screen-results','screen-answers']
    .forEach(s => document.getElementById(s).hidden = s !== id);
}

// ===================== START =====================
function updateStartInfo() {
  const n = parseInt(document.getElementById('q-count-slider').value);
  const mins = n * 2;
  document.getElementById('q-count-display').textContent = n;
  document.getElementById('time-display').textContent = mins;
}

function startExam() {
  TOTAL = parseInt(document.getElementById('q-count-slider').value);
  const mins = TOTAL * 2;
  S.qs = shuffle(BANK).slice(0, TOTAL);
  S.ans = {};
  S.flagged = new Set();
  S.cur = 0;
  S.timeLeft = mins * 60;
  S.startTime = Date.now();
  buildNavGrid();
  renderQuestion();
  startTimer();
  show('screen-exam');
}

// ===================== TIMER =====================
function startTimer() {
  clearInterval(S.timer);
  S.timer = setInterval(() => {
    S.timeLeft--;
    updateTimerDisplay();
    if (S.timeLeft <= 0) { clearInterval(S.timer); autoSubmit(); }
  }, 1000);
}

function updateTimerDisplay() {
  const h = Math.floor(S.timeLeft/3600);
  const m = Math.floor((S.timeLeft%3600)/60);
  const s = S.timeLeft % 60;
  const el = document.getElementById('timer-display');
  el.textContent = h>0 ? `${h}:${pad(m)}:${pad(s)}` : `${m}:${pad(s)}`;
  el.className = S.timeLeft < 900 ? 'font-mono text-lg font-bold min-w-[72px] text-right timer-warn' : 'font-mono text-lg font-bold text-white min-w-[72px] text-right';
}
function pad(n){return String(n).padStart(2,'0');}

function autoSubmit() { submitExam(); }

// ===================== QUESTION RENDER =====================
function renderQuestion() {
  const q = S.qs[S.cur];
  const container = document.getElementById('question-container');
  container.classList.remove('fade');
  void container.offsetWidth;
  container.classList.add('fade');

  document.getElementById('q-domain-badge').textContent = `Domain ${q.d}: ${q.dn}`;
  document.getElementById('q-type-badge').textContent = q.type==='multi' ? `複数選択（${q.choose}つ選択）` : '単一選択';
  document.getElementById('q-text').textContent = q.t;

  const optDiv = document.getElementById('q-options');
  optDiv.innerHTML = '';
  const chosen = S.ans[S.cur] || [];
  q.opts.forEach(o => {
    const sel = chosen.includes(o.id);
    const div = document.createElement('div');
    div.className = `opt border-2 rounded-xl p-4 flex items-start gap-3 ${sel ? 'opt-selected' : 'border-slate-200 bg-white'}`;
    div.innerHTML = `
      <span class="flex-shrink-0 w-7 h-7 rounded-lg flex items-center justify-center text-sm font-bold ${sel ? 'bg-orange-500 text-white' : 'bg-slate-100 text-slate-600'}">${o.id}</span>
      <span class="text-slate-700 text-sm leading-relaxed">${o.txt}</span>`;
    div.onclick = () => selectOption(o.id);
    optDiv.appendChild(div);
  });

  updateHeader();
  updateFlagBtn();
  updateNavGrid();
}

function selectOption(id) {
  const q = S.qs[S.cur];
  let chosen = S.ans[S.cur] ? [...S.ans[S.cur]] : [];
  if (q.type === 'single') {
    chosen = [id];
  } else {
    if (chosen.includes(id)) {
      chosen = chosen.filter(x => x !== id);
    } else {
      if (chosen.length < q.choose) chosen.push(id);
    }
  }
  S.ans[S.cur] = chosen;
  renderQuestion();
}

function updateHeader() {
  document.getElementById('hdr-cur').textContent = S.cur + 1;
  document.getElementById('hdr-tot').textContent = TOTAL;
  const ansCount = Object.keys(S.ans).filter(k => S.ans[k] && S.ans[k].length > 0).length;
  document.getElementById('hdr-ans').textContent = ansCount;
  document.getElementById('progress-bar').style.width = `${(ansCount/TOTAL)*100}%`;
}

function updateFlagBtn() {
  const btn = document.getElementById('flag-btn');
  btn.className = S.flagged.has(S.cur)
    ? 'flex items-center gap-1 text-yellow-600 border-2 border-yellow-400 bg-yellow-50 px-3 py-2 rounded-lg text-sm transition font-bold'
    : 'flex items-center gap-1 text-slate-600 hover:text-yellow-600 border border-slate-300 hover:border-yellow-400 px-3 py-2 rounded-lg text-sm transition';
  btn.textContent = S.flagged.has(S.cur) ? '🚩 フラグ中' : '🚩 フラグ';
}

// ===================== NAVIGATOR =====================
function buildNavGrid() {
  const grid = document.getElementById('nav-grid');
  grid.innerHTML = '';
  for (let i=0;i<TOTAL;i++) {
    const btn = document.createElement('button');
    btn.id = `qn-${i}`;
    btn.className = 'qn qn-unanswered';
    btn.textContent = i+1;
    btn.onclick = () => goTo(i);
    grid.appendChild(btn);
  }
}

function updateNavGrid() {
  for (let i=0;i<TOTAL;i++) {
    const btn = document.getElementById(`qn-${i}`);
    if (!btn) continue;
    let cls = 'qn ';
    if (S.flagged.has(i)) cls += 'qn-flagged';
    else if (S.ans[i] && S.ans[i].length > 0) cls += 'qn-answered';
    else cls += 'qn-unanswered';
    if (i === S.cur) cls += ' qn-current';
    btn.className = cls;
  }
}

function goTo(i) { S.cur = i; renderQuestion(); }

function prevQuestion() { if (S.cur > 0) { S.cur--; renderQuestion(); } }
function nextQuestion() { if (S.cur < TOTAL-1) { S.cur++; renderQuestion(); } }
function toggleFlag() {
  if (S.flagged.has(S.cur)) S.flagged.delete(S.cur); else S.flagged.add(S.cur);
  updateFlagBtn();
  updateNavGrid();
}

// ===================== REVIEW SCREEN =====================
function showReview() {
  const answered = Object.keys(S.ans).filter(k => S.ans[k] && S.ans[k].length > 0).length;
  const flagged = S.flagged.size;
  const unanswered = TOTAL - answered;
  document.getElementById('rv-answered').textContent = answered;
  document.getElementById('rv-flagged').textContent = flagged;
  document.getElementById('rv-unanswered').textContent = unanswered;

  const list = document.getElementById('review-list');
  list.innerHTML = '';
  S.qs.forEach((q, i) => {
    const isAns = S.ans[i] && S.ans[i].length > 0;
    const isFlagged = S.flagged.has(i);
    const div = document.createElement('div');
    div.className = 'bg-white rounded-xl p-3 flex items-center gap-3 cursor-pointer hover:border-orange-300 border border-transparent transition';
    div.onclick = () => { S.cur = i; show('screen-exam'); renderQuestion(); };
    div.innerHTML = `
      <span class="w-8 h-8 flex-shrink-0 rounded-lg flex items-center justify-center text-sm font-bold ${isAns?'bg-orange-100 text-orange-700':'bg-red-100 text-red-500'}">${i+1}</span>
      <span class="text-xs text-slate-600 flex-1 line-clamp-1">${q.t.substring(0,60)}…</span>
      <div class="flex items-center gap-1 flex-shrink-0">
        ${isFlagged?'<span class="text-yellow-500 text-sm">🚩</span>':''}
        <span class="text-xs ${isAns?'text-orange-600 font-bold':'text-red-500'}">${isAns?'回答済':'未回答'}</span>
      </div>`;
    list.appendChild(div);
  });
  show('screen-review');
}

function goBackToExam() { show('screen-exam'); }

// ===================== SUBMIT =====================
function submitExam() {
  clearInterval(S.timer);
  const elapsed = Math.floor((Date.now() - S.startTime) / 1000);
  let correct = 0;
  const domainStats = {1:{c:0,t:0},2:{c:0,t:0},3:{c:0,t:0},4:{c:0,t:0}};
  S.qs.forEach((q, i) => {
    domainStats[q.d].t++;
    const chosen = S.ans[i] || [];
    const isCorrect = q.correct.length === chosen.length && q.correct.every(x => chosen.includes(x));
    if (isCorrect) { correct++; domainStats[q.d].c++; }
  });
  const scaled = Math.round((correct / TOTAL) * 900 + 100);
  const pass = scaled >= PASS_SCORE;

  document.getElementById('result-icon').textContent = pass ? '🎉' : '📚';
  document.getElementById('result-title').textContent = pass ? '合格！おめでとうございます' : '不合格 - もう一度挑戦しましょう';
  document.getElementById('result-title').className = `text-2xl font-bold mb-1 ${pass?'text-green-600':'text-red-500'}`;
  document.getElementById('result-score').textContent = scaled;
  document.getElementById('res-correct').textContent = `${correct} / ${TOTAL}`;
  document.getElementById('res-wrong').textContent = `${TOTAL - correct} / ${TOTAL}`;
  const em = Math.floor(elapsed/60), es = elapsed%60;
  document.getElementById('res-time').textContent = `${em}分${es}秒`;

  const breakdown = document.getElementById('domain-breakdown');
  breakdown.innerHTML = '';
  [1,2,3,4].forEach(d => {
    const {c, t} = domainStats[d];
    const pct = t > 0 ? Math.round((c/t)*100) : 0;
    breakdown.innerHTML += `
      <div>
        <div class="flex justify-between text-sm mb-1">
          <span class="text-slate-600 text-xs">Domain ${d}: ${DOMAIN_NAMES[d]}</span>
          <span class="font-bold text-slate-700">${c}/${t} (${pct}%)</span>
        </div>
        <div class="w-full bg-slate-100 rounded-full h-2">
          <div class="h-2 rounded-full ${pct>=70?'bg-green-500':pct>=50?'bg-yellow-400':'bg-red-400'}" style="width:${pct}%"></div>
        </div>
      </div>`;
  });
  show('screen-results');
}

// ===================== ANSWER REVIEW =====================
function reviewAnswers() { S.arIdx = 0; renderAnswerReview(); show('screen-answers'); }
function backToResults() { show('screen-results'); }
function arPrev() { if (S.arIdx > 0) { S.arIdx--; renderAnswerReview(); } }
function arNext() { if (S.arIdx < TOTAL-1) { S.arIdx++; renderAnswerReview(); } }

function renderAnswerReview() {
  const i = S.arIdx;
  const q = S.qs[i];
  const chosen = S.ans[i] || [];
  const isCorrect = q.correct.length === chosen.length && q.correct.every(x => chosen.includes(x));

  document.getElementById('ar-cur').textContent = i+1;
  document.getElementById('ar-tot').textContent = TOTAL;

  const c = document.getElementById('ar-container');
  c.classList.remove('fade');
  void c.offsetWidth;
  c.classList.add('fade');

  let optsHtml = '';
  q.opts.forEach(o => {
    const isSel = chosen.includes(o.id);
    const isCorr = q.correct.includes(o.id);
    let cls = 'border-2 rounded-xl p-4 flex items-start gap-3 mb-2 opt-disabled ';
    let labelCls = 'flex-shrink-0 w-7 h-7 rounded-lg flex items-center justify-center text-sm font-bold ';
    if (isCorr && isSel) { cls += 'opt-correct'; labelCls += 'bg-green-500 text-white'; }
    else if (!isCorr && isSel) { cls += 'opt-wrong'; labelCls += 'bg-red-500 text-white'; }
    else if (isCorr && !isSel) { cls += 'opt-missed'; labelCls += 'bg-green-200 text-green-800'; }
    else { cls += 'border-slate-200 bg-white'; labelCls += 'bg-slate-100 text-slate-500'; }
    optsHtml += `<div class="${cls}"><span class="${labelCls}">${o.id}</span><span class="text-slate-700 text-sm leading-relaxed">${o.txt}</span></div>`;
  });

  c.innerHTML = `
    <div class="bg-white rounded-2xl shadow p-5 mb-3">
      <div class="flex items-center gap-2 mb-3">
        <span class="domain-badge bg-blue-100 text-blue-700">Domain ${q.d}: ${q.dn}</span>
        <span class="domain-badge ${isCorrect?'bg-green-100 text-green-700':'bg-red-100 text-red-600'}">${isCorrect?'✓ 正解':'✗ 不正解'}</span>
      </div>
      <p class="text-slate-800 text-sm leading-relaxed font-medium mb-4">${q.t}</p>
      ${optsHtml}
    </div>
    <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4">
      <div class="text-xs font-bold text-amber-700 mb-2">解説</div>
      <p class="text-slate-700 text-sm leading-relaxed">${q.exp}</p>
    </div>`;
}

// ===================== INIT =====================
updateTimerDisplay();
</script>
